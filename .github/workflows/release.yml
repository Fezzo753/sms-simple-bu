name: Release APK

# Triggered when a tag matching `v*` is pushed (e.g. `v0.1.0`).
# Builds, signs, and creates a draft GitHub Release with the APK attached.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64      base64 of your keystore file (e.g. `base64 -w0 simplebackup.jks`)
#   KEYSTORE_PASSWORD    keystore password
#   KEY_ALIAS            key alias inside the keystore (e.g. `simplebackup`)
#   KEY_PASSWORD         key password (often same as keystore password)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          mkdir -p $RUNNER_TEMP/keys
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/keys/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/keys/release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify signature
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          ls -la "$APK"
          $ANDROID_HOME/build-tools/*/apksigner verify --print-certs "$APK" | head -5

      - name: Rename APK with tag
        id: rename
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          OUT="SimpleBackup-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create draft Release with APK attached
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.rename.outputs.tag }}
          tag_name: ${{ steps.rename.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: ${{ steps.rename.outputs.apk }}
