<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
:root {
  --bg-dark: #0e1116;
  --bg-panel: #161b22;
  --bg-elev: #1f2630;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-out: #3fb950;
  --accent-in: #58a6ff;
  --accent-miss: #f85149;
  --bubble-recv: #21262d;
  --bubble-sent: #1f6feb;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; }
.app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; height: 100vh; }
.header { grid-column: 1 / -1; padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--bg-panel); }
.header h1 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
.header-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); }
.header-stats span strong { color: var(--text); }
.sidebar { background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; }
.sidebar-search { padding: 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-panel); z-index: 2; }
.sidebar-search input { width: 100%; padding: 8px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
.contact-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
.contact-row:hover { background: var(--bg-elev); }
.contact-row.active { background: var(--bg-elev); border-left: 3px solid var(--accent); padding-left: 11px; }
.contact-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-elev); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--accent); flex-shrink: 0; }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.contact-meta { font-size: 11px; color: var(--text-dim); }
.main { display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; background: var(--bg-panel); }
.back-btn { display: none; padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; }
.filter-chips { display: flex; gap: 8px; }
.chip { padding: 5px 12px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; color: var(--text-dim); cursor: pointer; font-size: 12px; }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.thread { flex: 1; overflow-y: auto; padding: 18px; }
.thread-empty { color: var(--text-dim); text-align: center; margin-top: 80px; }
.day-divider { text-align: center; margin: 18px 0 10px; color: var(--text-dim); font-size: 11px; }
.message { display: flex; margin-bottom: 6px; }
.message.sent { justify-content: flex-end; }
.bubble { max-width: 70%; padding: 8px 12px; border-radius: 14px; word-wrap: break-word; white-space: pre-wrap; }
.message.received .bubble { background: var(--bubble-recv); border-top-left-radius: 4px; }
.message.sent .bubble { background: var(--bubble-sent); border-top-right-radius: 4px; }
.timestamp { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.message.received .timestamp { text-align: left; }
.message.sent .timestamp { text-align: right; }
.call-entry { text-align: center; margin: 14px 0; color: var(--text-dim); font-size: 12px; padding: 8px; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); }
.call-entry .label { font-weight: 600; }
.call-entry.outgoing .label { color: var(--accent-out); }
.call-entry.incoming .label { color: var(--accent-in); }
.call-entry.missed .label, .call-entry.rejected .label { color: var(--accent-miss); }
.pager { padding: 10px; text-align: center; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 12px; }
.pager button { padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; margin: 0 4px; }
.pager button:disabled { opacity: 0.4; cursor: default; }
@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .sidebar.show { display: block; position: fixed; inset: 0; z-index: 10; }
  .header-stats { display: none; }
  .back-btn { display: inline-block; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>{{TITLE}}</h1>
    <div class="header-stats">
      <span>Messages: <strong>{{STATS_MESSAGES}}</strong></span>
      <span>Calls: <strong>{{STATS_CALLS}}</strong></span>
      <span>Contacts: <strong>{{STATS_CONTACTS}}</strong></span>
      <span>Period: <strong>{{STATS_PERIOD}}</strong></span>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <input id="search" type="search" placeholder="Search contacts...">
    </div>
    <div id="contact-list"></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <button class="back-btn" id="back-btn">‹ Contacts</button>
      <div class="filter-chips">
        <button class="chip active" data-kind="all">All</button>
        <button class="chip" data-kind="sms">Messages</button>
        <button class="chip" data-kind="call">Calls</button>
      </div>
    </div>
    <div class="thread" id="thread">
      <div class="thread-empty">Select a contact to view their thread.</div>
    </div>
    <div class="pager" id="pager" style="display: none;"></div>
  </div>
</div>
<script id="payload" type="application/octet-stream">{{PAYLOAD}}</script>
<script>
(async function() {
  const PAGE_SIZE_MSG = 500;
  const PAGE_SIZE_CALL = 1000;
  const state = { backup: null, currentAddr: null, filter: 'all', page: 0 };

  const payloadEl = document.getElementById('payload');
  const b64 = payloadEl.textContent.trim();
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const text = await new Response(stream).text();
  state.backup = JSON.parse(text);

  function initials(name) {
    if (!name) return '#';
    return name.trim().split(/\s+/).slice(0, 2).map(s => s[0].toUpperCase()).join('');
  }
  function fmtDate(ms) {
    const d = new Date(ms);
    return d.toLocaleString();
  }
  function fmtDay(ms) {
    return new Date(ms).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }
  function fmtDuration(s) {
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60), r = s % 60;
    if (m < 60) return m + 'm ' + r + 's';
    const h = Math.floor(m / 60), rm = m % 60;
    return h + 'h ' + rm + 'm';
  }
  function callKind(type) {
    return ({ 1: 'incoming', 2: 'outgoing', 3: 'missed', 5: 'rejected', 6: 'blocked' }[type]) || 'incoming';
  }

  function renderContacts(query) {
    const q = (query || '').toLowerCase();
    const list = document.getElementById('contact-list');
    list.innerHTML = '';
    const entries = Object.entries(state.backup.contacts || {})
      .map(([addr, info]) => ({ addr, info }))
      .filter(c => {
        if (!q) return true;
        return (c.info.name || '').toLowerCase().includes(q) || c.addr.includes(q);
      })
      .sort((a, b) => (a.info.name || a.addr).localeCompare(b.info.name || b.addr));
    for (const c of entries) {
      const row = document.createElement('div');
      row.className = 'contact-row' + (c.addr === state.currentAddr ? ' active' : '');
      row.innerHTML = '<div class="contact-avatar">' + initials(c.info.name || c.addr) + '</div>' +
        '<div class="contact-info">' +
          '<div class="contact-name">' + (c.info.name || c.addr) + '</div>' +
          '<div class="contact-meta">' + (c.info.name ? c.addr : '') + '</div>' +
        '</div>';
      row.onclick = () => selectContact(c.addr);
      list.appendChild(row);
    }
  }

  function selectContact(addr) {
    state.currentAddr = addr;
    state.page = 0;
    renderContacts(document.getElementById('search').value);
    renderThread();
    if (window.innerWidth <= 800) document.getElementById('sidebar').classList.remove('show');
  }

  function renderThread() {
    const thread = document.getElementById('thread');
    const pager = document.getElementById('pager');
    if (!state.currentAddr) {
      thread.innerHTML = '<div class="thread-empty">Select a contact to view their thread.</div>';
      pager.style.display = 'none';
      return;
    }
    const events = (state.backup.events || []).filter(e => {
      if (e.addr !== state.currentAddr) return false;
      if (state.filter === 'sms') return e.kind === 'sms' || e.kind === 'mms';
      if (state.filter === 'call') return e.kind === 'call';
      return true;
    });
    const pageSize = state.filter === 'call' ? PAGE_SIZE_CALL : PAGE_SIZE_MSG;
    const totalPages = Math.max(1, Math.ceil(events.length / pageSize));
    if (state.page >= totalPages) state.page = totalPages - 1;
    const start = state.page * pageSize;
    const slice = events.slice(start, start + pageSize);
    thread.innerHTML = '';
    let lastDay = null;
    for (const e of slice) {
      const day = fmtDay(e.date);
      if (day !== lastDay) {
        const sep = document.createElement('div');
        sep.className = 'day-divider';
        sep.textContent = day;
        thread.appendChild(sep);
        lastDay = day;
      }
      thread.appendChild(renderEvent(e));
    }
    if (slice.length === 0) {
      thread.innerHTML = '<div class="thread-empty">No events for this filter.</div>';
    }
    if (totalPages > 1) {
      pager.style.display = 'block';
      pager.innerHTML = '';
      const prev = document.createElement('button');
      prev.textContent = 'Prev';
      prev.disabled = state.page === 0;
      prev.onclick = () => { state.page--; renderThread(); };
      const next = document.createElement('button');
      next.textContent = 'Next';
      next.disabled = state.page >= totalPages - 1;
      next.onclick = () => { state.page++; renderThread(); };
      const lbl = document.createElement('span');
      lbl.textContent = ' Page ' + (state.page + 1) + ' / ' + totalPages + ' ';
      pager.appendChild(prev); pager.appendChild(lbl); pager.appendChild(next);
    } else {
      pager.style.display = 'none';
    }
  }

  function renderEvent(e) {
    if (e.kind === 'call') {
      const div = document.createElement('div');
      const kind = callKind(e.type);
      div.className = 'call-entry ' + kind;
      const dur = (kind === 'missed' || kind === 'rejected') ? '' : ' · ' + fmtDuration(e.duration_sec || 0);
      div.innerHTML = '<div class="label">📞 ' + kind.charAt(0).toUpperCase() + kind.slice(1) + ' call' + dur + '</div>' +
        '<div>' + fmtDate(e.date) + '</div>';
      return div;
    }
    const sent = e.type === 2;
    const div = document.createElement('div');
    div.className = 'message ' + (sent ? 'sent' : 'received');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = e.body || '';
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = new Date(e.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const wrap = document.createElement('div');
    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    div.appendChild(wrap);
    return div;
  }

  document.getElementById('search').addEventListener('input', e => renderContacts(e.target.value));
  document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state.filter = c.dataset.kind;
    state.page = 0;
    renderThread();
  }));
  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('show');
  });

  renderContacts('');
})();
</script>
</body>
</html>
